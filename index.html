<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Mô Hình Sói (Wolf) - AR.js</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="wolf-obj" src="Wolf_One_obj.obj"></a-asset-item>
        <a-asset-item id="wolf-mtl" src="Wolf_One_obj.mtl"></a-asset-item>
      </a-assets>
      
      <a-marker preset="hiro">
        
        <a-entity light="type: ambient; color: #ffffff; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="-1 1 1"></a-entity>
        
        <a-obj-model 
          src="#wolf-obj" 
          mtl="#wolf-mtl" 
          position="0 0 0" 
          scale="0.05 0.05 0.05" 
          rotation="0 0 0">
        </a-obj-model>

      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
